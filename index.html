<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebGPU Plain JS Starter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>GPU Slime Mould</h1>
      </header>
      <section class="canvas-card">
        <div class="controls">
          <label>
            Sensor Angle (SA)
            <input id="sa" type="range" min="0" max="1" step="0.01" value="0.45" />
            <span id="sa-value">0.39</span>
          </label>
          <label>
            Rotation Angle (RA)
            <input id="ra" type="range" min="0" max="1" step="0.01" value="0.52" />
            <span id="ra-value">0.52</span>
          </label>
          <label>
            Sensor Offset (SO)
            <input id="so" type="range" min="1" max="30" step="1" value="9" />
            <span id="so-value">9</span>
          </label>
          <label>
            Decay (log)
            <input id="decay" type="range" min="0" max="1" step="0.01" value="0.8" />
            <span id="decay-value">0.90</span>
          </label>
        </div>
        <canvas id="gfx" width="1000" height="600"></canvas>
        <div class="status" id="status">Initializing WebGPU…</div>
      </section>
    </main>
    <script type="module" src="main.js"></script>
  </body>
</html>
